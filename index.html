<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1A2E">
<title>WIPS 헬프데스크</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#F5F5F7;--bgc:#FFF;--bgh:#1A1A2E;--tp:#1A1A2E;--ts:#5A5A72;--tm:#9090A0;
--bd:#E4E4EC;--ac:#4A6CF7;--al:#EEF1FE;--ag:rgba(74,108,247,.12);
--dg:#EF4444;--dl:#FEF2F2;--sc:#10B981;--sl:#ECFDF5;--wn:#F59E0B;
--sh:0 4px 12px rgba(0,0,0,.06);--r:12px;
}
@media(prefers-color-scheme:dark){:root{
--bg:#0D0D1A;--bgc:#1A1A2E;--bgh:#12122B;--tp:#E8E8F0;--ts:#A0A0B8;--tm:#6A6A80;
--bd:#2A2A40;--ac:#6B8AFF;--al:#1E2248;--ag:rgba(107,138,255,.15);
--dl:#2D1515;--sl:#0D2D20;--sh:0 4px 12px rgba(0,0,0,.3);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--tp);min-height:100vh}
.screen{display:none}.screen.active{display:block}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--bgc);border:1px solid var(--bd);border-radius:20px;padding:36px 28px;max-width:360px;width:100%;box-shadow:var(--sh);text-align:center}
.login-icon{width:64px;height:64px;background:var(--al);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:4px}
.login-card .sub{font-size:13px;color:var(--tm);margin-bottom:20px}
.field{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--tp);background:var(--bg);outline:none;margin-bottom:8px;transition:border-color .2s}
.field:focus{border-color:var(--ac)}.field::placeholder{color:var(--tm)}
.btn{width:100%;padding:12px;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn-p{background:var(--ac);color:#fff}
.btn-d{background:var(--dg);color:#fff}
.btn-o{background:transparent;border:1.5px solid var(--bd);color:var(--ts);font-weight:500}
.btn-sm{padding:9px 14px;font-size:12px;border-radius:var(--r);border:none;font-family:inherit;font-weight:600;cursor:pointer}
.err{color:var(--dg);font-size:12px;margin-top:6px;display:none;line-height:1.5}.err.show{display:block}
.login-ft{font-size:11px;color:var(--tm);margin-top:16px;line-height:1.6}
.hdr{background:var(--bgh);color:#fff;padding:14px 16px 22px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:-18px;left:-10%;width:120%;height:36px;background:var(--bg);border-radius:50% 50% 0 0}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-ic{width:32px;height:32px;background:rgba(255,255,255,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr-l h1{font-size:17px;font-weight:600}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5);margin-left:40px;margin-top:2px}
.hdr-r{display:flex;gap:5px;align-items:center}
.hdr-btn{background:rgba(255,255,255,.1);border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:14px}
.hdr-btn:hover{background:rgba(255,255,255,.2)}
.u-pill{font-size:10px;color:rgba(255,255,255,.55);background:rgba(255,255,255,.1);padding:2px 8px;border-radius:14px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dept-pill{font-size:9px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.06);padding:2px 6px;border-radius:10px}
.srch-w{padding:0 16px;margin-top:-8px;position:relative;z-index:10}
.srch{background:var(--bgc);border-radius:var(--r);box-shadow:var(--sh);display:flex;align-items:center;padding:0 14px;border:1.5px solid transparent}
.srch:focus-within{border-color:var(--ac)}
.srch svg{flex-shrink:0;color:var(--tm);width:16px;height:16px}
.srch input{flex:1;border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;color:var(--tp);padding:12px 10px}
.srch input::placeholder{color:var(--tm)}
.sc{display:none;background:var(--bd);border:none;width:20px;height:20px;border-radius:50%;font-size:11px;color:var(--ts);cursor:pointer;align-items:center;justify-content:center}.sc.show{display:flex}
.stats{display:flex;gap:6px;padding:12px 16px 4px;overflow-x:auto;flex-wrap:nowrap}.stats::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--bgc);border:1px solid var(--bd);border-radius:14px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--ts);white-space:nowrap}
.chip b{color:var(--ac);font-weight:600}
.content{padding:6px 16px 100px}
.sec-t{font-size:14px;font-weight:600;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
.sec-t .cnt{font-size:11px;font-weight:500;color:var(--tm);background:var(--al);padding:2px 7px;border-radius:8px}
/* Major category grid */
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.cc{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:14px 12px;cursor:pointer;transition:transform .12s;position:relative}
.cc:active{transform:scale(.97)}
.cc .ci{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px}
.cc .cn{font-size:13px;font-weight:600;margin-bottom:2px}
.cc .ct{font-size:11px;color:var(--tm)}
.cc .cd{position:absolute;top:10px;right:10px;width:5px;height:5px;border-radius:50%}
.cc.locked{opacity:.35;pointer-events:none}
.cc.locked::after{content:'🔒';position:absolute;top:10px;right:10px;font-size:12px}
/* Sub-category list inside major category */
.sub-cat-list{margin-bottom:8px}
.sub-cat-item{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:transform .12s}
.sub-cat-item:active{transform:scale(.98)}
.sub-cat-item.locked{opacity:.35;pointer-events:none;position:relative}
.sub-cat-item.locked::after{content:'🔒';position:absolute;right:12px;font-size:12px}
.sub-cat-item .sci{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sub-cat-item .scn{font-size:13px;font-weight:500;flex:1}
.sub-cat-item .scc{font-size:11px;color:var(--tm);flex-shrink:0}
.sub-cat-item .sca{font-size:12px;color:var(--tm);flex-shrink:0}
/* Breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tm);margin-bottom:8px;flex-wrap:wrap}
.breadcrumb span{cursor:pointer;color:var(--ac);font-weight:500}
.breadcrumb span:hover{text-decoration:underline}
.breadcrumb .bc-sep{color:var(--tm);cursor:default;font-size:10px}
.breadcrumb .bc-cur{color:var(--tp);font-weight:600;cursor:default}
/* Detail */
.det{display:none}.det.active{display:block}
.det-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bk{background:var(--bgc);border:1px solid var(--bd);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ts);flex-shrink:0;font-size:15px}
.bk:active{background:var(--bd)}
.dt h2{font-size:16px;font-weight:600}.dt span{font-size:11px;color:var(--tm)}
.ic{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.ic.open{box-shadow:var(--sh)}
.ih{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ih:active{background:var(--al)}
.sv{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sh{background:#EF4444}.sm{background:#F59E0B}.sl{background:#10B981}
.ih .nm{flex:1;font-size:13px;font-weight:500;line-height:1.4}
.ar{flex-shrink:0;font-size:12px;color:var(--tm);transition:transform .2s}
.ic.open .ar{transform:rotate(180deg)}
.ib{display:none;padding:0 14px 12px;border-top:1px solid var(--bd)}
.ic.open .ib{display:block;padding-top:10px}
.tg{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tgi{font-size:10px;font-weight:500;padding:2px 7px;border-radius:14px}
.thw{background:#FEF3C7;color:#92400E}.tsw{background:#EDE9FE;color:#5B21B6}.tnt{background:#DBEAFE;color:#1E40AF}
@media(prefers-color-scheme:dark){.thw{background:#422006;color:#FCD34D}.tsw{background:#2E1065;color:#C4B5FD}.tnt{background:#172554;color:#93C5FD}}
.sli{list-style:none}
.si{display:flex;gap:10px;padding:5px 0;position:relative}
.si:not(:last-child)::after{content:'';position:absolute;left:11px;top:26px;width:1.5px;height:calc(100% - 12px);background:var(--bd)}
.sn{width:22px;height:22px;background:var(--al);color:var(--ac);font-size:10px;font-weight:600;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1}
.st{font-size:12px;line-height:1.6;color:var(--ts);padding-top:2px;flex:1}.st b{color:var(--tp);font-weight:500}
.step-img{width:100%;max-width:320px;border-radius:8px;margin-top:6px;border:1px solid var(--bd);cursor:pointer}
.tip{background:var(--al);border-radius:8px;padding:7px 10px;margin-top:6px;font-size:11px;line-height:1.5;color:var(--ac);display:flex;gap:6px}
.sr{display:none}.sr.active{display:block}
.se{text-align:center;padding:50px 20px;color:var(--tm);font-size:13px}
.ap{display:none}.ap.active{display:block}
.atabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.atabs::-webkit-scrollbar{display:none}
.atab{flex-shrink:0;padding:8px 14px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bgc);font-family:inherit;font-size:12px;font-weight:500;color:var(--ts);cursor:pointer;white-space:nowrap}
.atab.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.uc{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ua{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.ui{flex:1;min-width:0}
.un{font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ur{font-size:9px;padding:1px 5px;border-radius:6px;font-weight:500}
.ura{background:var(--al);color:var(--ac)}.uru{background:var(--bg);color:var(--tm)}
.ud-tag{font-size:9px;padding:1px 5px;border-radius:6px;font-weight:500;background:var(--sl);color:var(--sc)}
.uid{font-size:10px;color:var(--tm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uact{display:flex;gap:3px}
.ub{background:var(--bg);border:1px solid var(--bd);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ts);font-size:12px}
.ub:hover{background:var(--bd)}.ub.dl{color:var(--dg)}.ub.dl:hover{background:var(--dl)}
.af{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px}
.af h3{font-size:13px;font-weight:600;margin-bottom:10px}
.fr{margin-bottom:6px}.fr label{font-size:11px;color:var(--ts);display:block;margin-bottom:3px}
.fr select{width:100%;padding:10px;border:1.5px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--tp);background:var(--bg);outline:none}
.fb{display:flex;gap:6px;margin-top:10px}
.perm-grid{margin-top:8px}
.perm-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.perm-row:last-child{border-bottom:none}
.perm-cat{flex:1;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.perm-cat .picon{font-size:16px}
.perm-checks{display:flex;gap:4px;flex-wrap:wrap}
.perm-chip{font-size:10px;padding:3px 8px;border-radius:8px;cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--ts);transition:all .15s;user-select:none}
.perm-chip.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.perm-chip:hover{border-color:var(--ac)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bgh);color:#fff;padding:9px 18px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.2);opacity:0;transition:all .3s;z-index:500;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mo.show{display:flex}
.ml{background:var(--bgc);border-radius:16px;padding:22px;max-width:320px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
.ml h3{font-size:15px;font-weight:600;margin-bottom:6px}
.ml p{font-size:12px;color:var(--ts);margin-bottom:16px;line-height:1.6}
.ml .mbs{display:flex;gap:6px}.ml .mbs .btn{flex:1}
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;cursor:pointer}
.img-modal.show{display:flex}
.img-modal img{max-width:100%;max-height:90vh;border-radius:8px}
.sync-bar{background:var(--al);padding:6px 12px;border-radius:8px;font-size:11px;color:var(--ac);text-align:center;margin-bottom:8px;display:none}
.sync-bar.show{display:block}
.issue-card{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.issue-card .ic-color{width:4px;height:32px;border-radius:2px;flex-shrink:0}
.issue-card .ic-info{flex:1;min-width:0}
.issue-card .ic-title{font-size:12px;font-weight:500}
.issue-card .ic-meta{font-size:10px;color:var(--tm)}
.cat-select-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.cat-sel-chip{font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--ts);transition:all .15s}
.cat-sel-chip.active{color:#fff;border-color:transparent}
/* Major category section in issue manager */
.major-section{margin-top:10px;margin-bottom:6px}
.major-section-hdr{font-size:13px;font-weight:600;padding:6px 0;display:flex;align-items:center;gap:6px;border-bottom:2px solid var(--bd);margin-bottom:6px}
.sub-section-hdr{font-size:12px;font-weight:500;padding:4px 8px;display:flex;align-items:center;gap:4px;color:var(--ts);margin-top:6px;margin-bottom:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.an{animation:fadeUp .2s ease-out both}
@media(min-width:480px){.cg{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){body{display:flex;justify-content:center}.app{max-width:480px;width:100%}}
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
<div class="login-wrap"><div class="login-card">
  <div class="login-icon">🏢</div>
  <h1>WIPS 헬프데스크</h1>
  <p class="sub">사내 업무 가이드 & IT 지원 시스템</p>
  <input type="text" class="field" id="loginId" placeholder="아이디" onkeydown="if(event.key==='Enter')doLogin()">
  <input type="password" class="field" id="loginPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn btn-p" id="loginBtn" onclick="doLogin()">로그인</button>
  <div class="err" id="loginErr"></div>
  <div class="login-ft">데이터는 Google Sheets에서 관리됩니다</div>
</div></div>
</div>

<!-- MAIN -->
<div class="screen" id="mainScreen">
<header class="hdr">
  <div class="hdr-row">
    <div class="hdr-l"><div class="hdr-ic">🏢</div><h1>WIPS 헬프데스크</h1></div>
    <div class="hdr-r">
      <span class="u-pill" id="userPill"></span>
      <span class="dept-pill" id="deptPill"></span>
      <button class="hdr-btn" id="adminBtn" onclick="showAdmin()" style="display:none">⚙️</button>
      <button class="hdr-btn" onclick="showPwChange()">🔑</button>
      <button class="hdr-btn" onclick="doLogout()">🚪</button>
    </div>
  </div>
  <div class="hdr-sub" id="hdrSub">카테고리를 선택하거나 키워드를 검색하세요</div>
</header>

<div class="srch-w" id="srchWrap">
  <div class="srch">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="sInput" placeholder="검색 (장애 증상, 업무 방법 등)" oninput="doSearch(this.value)">
    <button class="sc" id="sClear" onclick="clrSearch()">✕</button>
  </div>
</div>

<div class="stats" id="statsBar">
  <div class="chip">전체 <b id="totalCnt">0</b>건</div>
  <div class="chip">열람가능 <b id="accessCnt">0</b>건</div>
</div>

<div class="content">
  <div class="sync-bar" id="syncBar">📡 서버에서 데이터 동기화 중...</div>

  <!-- 홈: 대분류 카드 -->
  <div id="homeView">
    <div class="sec-t">카테고리</div>
    <div class="cg" id="majorGrid"></div>
  </div>

  <!-- 소분류 목록 (대분류 클릭 시) -->
  <div class="det" id="subCatView">
    <div class="det-h"><button class="bk" onclick="goHome()">◀</button><div class="dt"><h2 id="subCatTitle"></h2><span id="subCatCount"></span></div></div>
    <div id="subCatList"></div>
  </div>

  <!-- 가이드 목록 (소분류 클릭 시) -->
  <div class="det" id="detView">
    <div id="detBreadcrumb" class="breadcrumb"></div>
    <div class="det-h"><button class="bk" id="detBackBtn" onclick="goBackFromDetail()">◀</button><div class="dt"><h2 id="dT"></h2><span id="dC"></span></div></div>
    <div id="dCards"></div>
  </div>

  <!-- 검색 결과 -->
  <div class="sr" id="sView">
    <div class="sec-t">검색 결과 <span class="cnt" id="sCnt">0건</span></div>
    <div id="sCards"></div>
  </div>

  <!-- ADMIN -->
  <div class="ap" id="adminPanel">
    <div class="det-h"><button class="bk" onclick="hideAdmin()">◀</button><div class="dt"><h2>⚙️ 관리자 설정</h2><span>사용자·가이드 데이터·부서·권한 관리</span></div></div>
    <div class="atabs" id="aTabs">
      <button class="atab active" onclick="aTab('users',this)">직원 관리</button>
      <button class="atab" onclick="aTab('adduser',this)">직원 추가</button>
      <button class="atab" onclick="aTab('issues',this)">가이드 관리</button>
      <button class="atab" onclick="aTab('depts',this)">부서 관리</button>
      <button class="atab" onclick="aTab('perms',this)">카테고리 권한</button>
    </div>
    <div id="aUsers"></div>
    <div id="aAddUser" style="display:none"></div>
    <div id="aIssues" style="display:none"></div>
    <div id="aDepts" style="display:none"></div>
    <div id="aPerms" style="display:none"></div>
  </div>

  <!-- PW Change -->
  <div class="ap" id="pwPanel">

<div class="mo" id="delModal"><div class="ml"><h3 id="delTitle">삭제</h3><p id="delMsg"></p><div class="mbs"><button class="btn btn-o" onclick="closeModal()">취소</button><button class="btn btn-d" onclick="confirmDel()">삭제</button></div></div></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxTDMRVJQ3aBbVe-CLexKVYonRejefykO-KwH_zjr3zFmrJj3ISItqPfiYtIbPkSlKU/exec';

const DEF_DEPTS=[{id:'it',name:'전산팀',color:'#4A6CF7'},{id:'security',name:'보안팀',color:'#06B6D4'},{id:'infra',name:'인프라팀',color:'#10B981'},{id:'general',name:'일반',color:'#9090A0'}];
const DEF_PERMS={it:['printer','network','bluescreen','boot','software','monitor','keyboard','security','storage','sound'],security:['security','network','software'],infra:['network','boot','storage','monitor'],general:['printer','software','keyboard','sound']};
const DEF_USERS=[{id:'admin',name:'관리자',pw:'admin1234',role:'admin',dept:'it',created:'2026-05-08'}];

function g(k,d){try{const v=JSON.parse(localStorage.getItem('pcg_'+k));return v||d;}catch(e){return d;}}
function s(k,v){localStorage.setItem('pcg_'+k,JSON.stringify(v));}
function getUsers(){return g('users',DEF_USERS);}
function saveUsers(u){s('users',u);}
function getDepts(){return g('depts',DEF_DEPTS);}
function saveDepts(d){s('depts',d);}
function getPerms(){return g('perms',DEF_PERMS);}
function savePerms(p){s('perms',p);}
function getSess(){try{return JSON.parse(sessionStorage.getItem('pcg_sess'));}catch(e){return null;}}
function setSess(v){sessionStorage.setItem('pcg_sess',JSON.stringify(v));}
function clrSess(){sessionStorage.removeItem('pcg_sess');}

let CU=null,delTgt=null,delType='';

// ══════════════════════════════════════════════════
// 3-LEVEL DATA STRUCTURE
// ══════════════════════════════════════════════════
// MAJORS: { major_id: {name, icon, color, subs:{cat_id:{name,icon,color,items:[...]}} } }
let MAJORS={};
// DB: flat cat→{name,icon,color,items} (for backward compat: search, perms)
let DB={};
let RAW_ISSUES=[];

// Default major categories mapping (when major_cat is missing from sheet data)
const DEF_MAJOR_MAP={
  'printer':'pc_trouble','network':'pc_trouble','bluescreen':'pc_trouble','boot':'pc_trouble',
  'software':'pc_trouble','monitor':'pc_trouble','keyboard':'pc_trouble','security':'pc_trouble',
  'storage':'pc_trouble','sound':'pc_trouble'
};
const DEF_MAJORS={
  'pc_trouble':{name:'PC 장애',icon:'🖥️',color:'#4A6CF7'},
  'work_guide':{name:'업무 가이드',icon:'📋',color:'#10B981'}
};

async function apiGet(action){try{const r=await fetch(API_URL+'?action='+action);return await r.json();}catch(e){return null;}}
async function apiPost(data){try{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});return await r.json();}catch(e){return null;}}

function driveImgUrl(url){if(!url)return '';const m=String(url).match(/\/d\/([a-zA-Z0-9_-]+)/);if(m)return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800';return String(url);}

// ══════════════════════════════════════════════════
// BUILD 3-LEVEL STRUCTURE FROM RAW ISSUES
// ══════════════════════════════════════════════════
function buildDB(issues){
  DB={};
  MAJORS={};
  issues.forEach(row=>{
    const cat=String(row.category||'');if(!cat)return;
    // Determine major category
    let majorId=String(row.major_cat||'').trim();
    let majorName=String(row.major_name||'').trim();
    let majorIcon=String(row.major_icon||'').trim();
    let majorColor=String(row.major_color||'').trim();
    // Fallback: use DEF_MAJOR_MAP or default to 'pc_trouble'
    if(!majorId){
      majorId=DEF_MAJOR_MAP[cat]||'pc_trouble';
    }
    if(!majorName){
      majorName=(DEF_MAJORS[majorId]||{}).name||majorId;
    }
    if(!majorIcon){
      majorIcon=(DEF_MAJORS[majorId]||{}).icon||'📁';
    }
    if(!majorColor){
      majorColor=(DEF_MAJORS[majorId]||{}).color||'#9090A0';
    }
    // Build major
    if(!MAJORS[majorId]){
      MAJORS[majorId]={name:majorName,icon:majorIcon,color:majorColor,subs:{}};
    }
    // Build sub (category)
    if(!MAJORS[majorId].subs[cat]){
      MAJORS[majorId].subs[cat]={name:String(row.cat_name||cat),icon:String(row.cat_icon||'📁'),color:String(row.cat_color||'#9090A0'),items:[]};
    }
    // Build flat DB too
    if(!DB[cat])DB[cat]={name:String(row.cat_name||cat),icon:String(row.cat_icon||'📁'),color:String(row.cat_color||'#9090A0'),items:[]};
    // Build item
    const steps=[],imgs=[];
    for(let i=1;i<=4;i++){const st=String(row['step'+i]||'');if(st){steps.push(st);imgs.push(driveImgUrl(row['img'+i]||''));}}
    const tags=String(row.tags||'').split(',').map(x=>x.trim()).filter(Boolean);
    const item={title:String(row.title||''),severity:String(row.severity||'mid'),tags,steps,imgs,tip:String(row.tip||'')};
    MAJORS[majorId].subs[cat].items.push(item);
    DB[cat].items.push(item);
  });
  s('db_cache',DB);
  s('majors_cache',MAJORS);
}

function loadCachedDB(){
  const c=g('db_cache',null);if(c)DB=c;
  const m=g('majors_cache',null);if(m)MAJORS=m;
  RAW_ISSUES=g('raw_issues',[]);
}

async function syncFromServer(){
  const bar=document.getElementById('syncBar');if(bar)bar.classList.add('show');
  const data=await apiGet('getAll');
  if(!data||data.error){if(bar)bar.classList.remove('show');return false;}
  if(data.users&&data.users.length){saveUsers(data.users.map(u=>({id:String(u.id||''),name:String(u.name||''),pw:String(u.pw||''),role:String(u.role||'user'),dept:String(u.dept||'general'),created:String(u.created||'').slice(0,10)})));}
  if(data.depts&&data.depts.length){saveDepts(data.depts.map(d=>({id:String(d.id||''),name:String(d.name||''),color:String(d.color||'#9090A0')})));}
  if(data.perms&&data.perms.length){const perms={};data.perms.forEach(p=>{perms[String(p.dept_id||'')]=String(p.categories||'').split(',').map(x=>x.trim()).filter(Boolean);});savePerms(perms);}
  if(data.issues&&data.issues.length){
    RAW_ISSUES=data.issues;s('raw_issues',RAW_ISSUES);
    buildDB(data.issues);
  }
  if(bar)bar.classList.remove('show');return true;
}

// ══════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════
async function doLogin(){
  const id=document.getElementById('loginId').value.trim(),pw=document.getElementById('loginPw').value,er=document.getElementById('loginErr'),btn=document.getElementById('loginBtn');
  if(!id||!pw){er.textContent='아이디와 비밀번호를 입력하세요.';er.classList.add('show');return;}
  loadCachedDB();
  const cached=getUsers();
  const u=cached.find(x=>x.id===id&&x.pw===pw);
  if(u){
    er.classList.remove('show');CU=u;setSess({id:u.id});showMain();
    syncFromServer().then(()=>{if(CU){const u2=getUsers().find(x=>x.id===CU.id);if(u2)CU=u2;goHome();}});
  } else {
    btn.textContent='확인 중...';btn.disabled=true;
    await syncFromServer();
    btn.textContent='로그인';btn.disabled=false;
    const u2=getUsers().find(x=>x.id===id&&x.pw===pw);
    if(!u2){er.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';er.classList.add('show');return;}
    er.classList.remove('show');CU=u2;setSess({id:u2.id});showMain();
  }
}
function doLogout(){clrSess();CU=null;document.getElementById('mainScreen').classList.remove('active');document.getElementById('loginScreen').classList.add('active');document.getElementById('loginId').value='';document.getElementById('loginPw').value='';}
function showMain(){
  document.getElementById('loginScreen').classList.remove('active');document.getElementById('mainScreen').classList.add('active');
  document.getElementById('userPill').textContent=CU.name;
  const dept=getDepts().find(d=>d.id===CU.dept);document.getElementById('deptPill').textContent=dept?dept.name:'';
  document.getElementById('adminBtn').style.display=CU.role==='admin'?'flex':'none';goHome();
}
async function checkSess(){const ss=getSess();if(ss){loadCachedDB();const u=getUsers().find(x=>x.id===ss.id);if(u){CU=u;showMain();syncFromServer().then(()=>{if(CU){const u2=getUsers().find(x=>x.id===ss.id);if(u2)CU=u2;goHome();}});}else clrSess();}}

function getUserCats(){if(!CU)return[];if(CU.role==='admin')return Object.keys(DB);const perms=getPerms();return perms[CU.dept]||[];}

// ══════════════════════════════════════════════════
// NAVIGATION STATE
// ══════════════════════════════════════════════════
let curMajor=null; // current major_id being viewed

const TL={HW:'하드웨어',SW:'소프트웨어',NET:'네트워크'};
const TC={HW:'thw',SW:'tsw',NET:'tnt'};

// ══════════════════════════════════════════════════
// HOME VIEW: 대분류 카드 그리드
// ══════════════════════════════════════════════════
function initMajorCats(){
  const grid=document.getElementById('majorGrid');
  grid.innerHTML='';
  const allowed=getUserCats();
  let total=0,access=0;
  // Count items
  Object.keys(DB).forEach(k=>{
    total+=DB[k].items.length;
    if(allowed.includes(k))access+=DB[k].items.length;
  });
  document.getElementById('totalCnt').textContent=total;
  document.getElementById('accessCnt').textContent=access;

  // Render major categories
  Object.keys(MAJORS).forEach(mk=>{
    const m=MAJORS[mk];
    // Count how many sub-cats and total items in this major
    const subKeys=Object.keys(m.subs);
    let itemCount=0;
    let hasAccess=false;
    subKeys.forEach(sk=>{
      itemCount+=m.subs[sk].items.length;
      if(allowed.includes(sk))hasAccess=true;
    });
    // If admin, always show. Otherwise check if at least one sub-cat is accessible
    const canAccess=CU.role==='admin'||hasAccess;
    grid.innerHTML+=`<div class="cc an ${canAccess?'':'locked'}" ${canAccess?`onclick="showMajor('${mk}')"`:''}> 
      <div class="cd" style="background:${m.color}"></div>
      <div class="ci" style="background:${m.color}15">${m.icon}</div>
      <div class="cn">${m.name}</div>
      <div class="ct">${subKeys.length}개 소분류 · ${itemCount}건</div></div>`;
  });

  // If no majors exist (empty DB), show message
  if(!Object.keys(MAJORS).length){
    grid.innerHTML='<div class="se" style="grid-column:1/-1">가이드 데이터가 없습니다.<br>관리자에게 문의하세요.</div>';
  }
}

// ══════════════════════════════════════════════════
// SUB-CATEGORY VIEW: 대분류 → 소분류 목록
// ══════════════════════════════════════════════════
function showMajor(mk){
  const m=MAJORS[mk];if(!m)return;
  curMajor=mk;
  hideAll();
  document.getElementById('statsBar').style.display='none';
  document.getElementById('srchWrap').style.display='block';
  document.getElementById('subCatView').classList.add('active');
  document.getElementById('subCatTitle').textContent=m.icon+' '+m.name;
  const subKeys=Object.keys(m.subs);
  let totalItems=0;subKeys.forEach(sk=>totalItems+=m.subs[sk].items.length);
  document.getElementById('subCatCount').textContent=subKeys.length+'개 소분류 · '+totalItems+'건';

  const list=document.getElementById('subCatList');
  list.innerHTML='';
  const allowed=getUserCats();

  subKeys.forEach((sk,i)=>{
    const sub=m.subs[sk];
    const ok=allowed.includes(sk)||CU.role==='admin';
    list.innerHTML+=`<div class="sub-cat-item an ${ok?'':'locked'}" style="animation-delay:${i*.03}s" ${ok?`onclick="showSubCat('${mk}','${sk}')"`:''}>
      <div class="sci" style="background:${sub.color}15">${sub.icon}</div>
      <div class="scn">${sub.name}</div>
      <div class="scc">${sub.items.length}건</div>
      <div class="sca">▶</div>
    </div>`;
  });
  scrollTo(0,0);
}

// ══════════════════════════════════════════════════
// DETAIL VIEW: 소분류 → 개별 가이드 목록
// ══════════════════════════════════════════════════
function showSubCat(mk,sk){
  const m=MAJORS[mk];if(!m)return;
  const sub=m.subs[sk];if(!sub)return;
  curMajor=mk;
  hideAll();
  document.getElementById('statsBar').style.display='none';
  document.getElementById('srchWrap').style.display='block';
  document.getElementById('detView').classList.add('active');
  // Breadcrumb
  document.getElementById('detBreadcrumb').innerHTML=
    `<span onclick="goHome()">홈</span><span class="bc-sep">›</span>`+
    `<span onclick="showMajor('${mk}')">${m.icon} ${m.name}</span><span class="bc-sep">›</span>`+
    `<span class="bc-cur">${sub.icon} ${sub.name}</span>`;
  document.getElementById('dT').textContent=sub.icon+' '+sub.name;
  document.getElementById('dC').textContent=sub.items.length+'건';
  renderCards(sub.items,document.getElementById('dCards'),sk);
  scrollTo(0,0);
}

function goBackFromDetail(){
  if(curMajor){showMajor(curMajor);}else{goHome();}
}

function showImg(url){document.getElementById('imgModalSrc').src=url;document.getElementById('imgModal').classList.add('show');}

function renderCards(items,el,ck){
  el.innerHTML='';
  items.forEach((it,i)=>{
    const tags=it.tags.map(t=>`<span class="tgi ${TC[t]||''}">${TL[t]||t}</span>`).join('');
    const steps=it.steps.map((st,j)=>{
      const imgUrl=(it.imgs&&it.imgs[j])?it.imgs[j]:'';
      const imgTag=imgUrl?`<img class="step-img" src="${imgUrl}" alt="step${j+1}" onclick="event.stopPropagation();showImg('${imgUrl}')" onerror="this.style.display='none'">`:'';
      return `<li class="si"><span class="sn">${j+1}</span><span class="st">${st}${imgTag}</span></li>`;
    }).join('');
    const tip=it.tip?`<div class="tip"><span>💡</span><span>${it.tip}</span></div>`:'';
    const sv=it.severity==='high'?'sh':it.severity==='mid'?'sm':'sl';
    const uid='i-'+(ck||'s')+'-'+i;
    el.innerHTML+=`<div class="ic an" style="animation-delay:${i*.03}s" id="${uid}"><div class="ih" onclick="tgl('${uid}')"><span class="sv ${sv}"></span><span class="nm">${it.title}</span><span class="ar">▼</span></div><div class="ib"><div class="tg">${tags}</div><ul class="sli">${steps}</ul>${tip}</div></div>`;
  });
}

function hideAll(){
  ['homeView','subCatView','detView','sView','adminPanel','pwPanel'].forEach(id=>{
    const e=document.getElementById(id);
    if(e.classList.contains('det')||e.classList.contains('ap')||e.classList.contains('sr'))e.classList.remove('active');
    else e.style.display='none';
  });
  document.getElementById('homeView').style.display='none';
}
function goHome(){
  curMajor=null;
  hideAll();
  document.getElementById('homeView').style.display='block';
  document.getElementById('statsBar').style.display='flex';
  document.getElementById('srchWrap').style.display='block';
  document.getElementById('sInput').value='';
  document.getElementById('sClear').classList.remove('show');
  initMajorCats();
  scrollTo(0,0);
}
function tgl(id){const c=document.getElementById(id),o=c.classList.contains('open');document.querySelectorAll('.ic.open').forEach(x=>x.classList.remove('open'));if(!o)c.classList.add('open');}

function doSearch(v){
  const cl=document.getElementById('sClear');
  if(!v.trim()){cl.classList.remove('show');goHome();return;}
  cl.classList.add('show');
  const q=v.toLowerCase(),res=[],allowed=getUserCats();
  Object.keys(DB).forEach(k=>{
    if(!allowed.includes(k)&&CU.role!=='admin')return;
    DB[k].items.forEach(it=>{
      if(it.title.toLowerCase().includes(q)||it.steps.some(st=>st.toLowerCase().includes(q)))res.push(it);
    });
  });
  hideAll();
  document.getElementById('statsBar').style.display='none';
  document.getElementById('sView').classList.add('active');
  document.getElementById('sCnt').textContent=res.length+'건';
  const c=document.getElementById('sCards');
  if(!res.length)c.innerHTML=`<div class="se">"${v}" 검색 결과 없음</div>`;
  else renderCards(res,c,null);
}
function clrSearch(){document.getElementById('sInput').value='';goHome();}

function showAdmin(){hideAll();document.getElementById('adminPanel').classList.add('active');document.getElementById('statsBar').style.display='none';document.getElementById('srchWrap').style.display='none';aTab('users',document.querySelectorAll('.atab')[0]);}

function aTab(tab,el){document.querySelectorAll('.atab').forEach(t=>t.classList.remove('active'));el.classList.add('active');['aUsers','aAddUser','aIssues','aDepts','aPerms'].forEach(id=>document.getElementById(id).style.display='none');
  if(tab==='users'){document.getElementById('aUsers').style.display='block';renderUserList();}
  else if(tab==='adduser'){document.getElementById('aAddUser').style.display='block';renderAddUser();}
  else if(tab==='issues'){document.getElementById('aIssues').style.display='block';renderIssueManager();}
  else if(tab==='depts'){document.getElementById('aDepts').style.display='block';renderDepts();}
  else if(tab==='perms'){document.getElementById('aPerms').style.display='block';renderPerms();}
}

function renderUserList(){
  const users=getUsers(),depts=getDepts(),el=document.getElementById('aUsers');
  const cols=['#4A6CF7','#10B981','#F97316','#EC4899','#8B5CF6','#06B6D4','#EF4444'];
  el.innerHTML=users.map((u,i)=>{
    const c=cols[i%cols.length],dept=depts.find(d=>d.id===u.dept),isMe=CU&&u.id===CU.id;
    const rTag=u.role==='admin'?'<span class="ur ura">관리자</span>':'<span class="ur uru">일반</span>';
    const dTag=dept?`<span class="ud-tag">${dept.name}</span>`:'';
    const del=(isMe||u.role==='admin'&&users.filter(x=>x.role==='admin').length<=1)?'':`<button class="ub dl" onclick="askDelUser('${u.id}')">✕</button>`;
    const role=isMe?'':(u.role==='admin'?`<button class="ub" title="일반으로" onclick="tglRole('${u.id}')">👤</button>`:`<button class="ub" title="관리자로" onclick="tglRole('${u.id}')">⭐</button>`);
    const pwReset=isMe?'':`<button class="ub" title="비밀번호 초기화" onclick="resetPw('${u.id}')">🔑</button>`;
    return `<div class="uc an" style="animation-delay:${i*.02}s"><div class="ua" style="background:${c}18;color:${c}">${u.name[0]}</div><div class="ui"><div class="un">${u.name} ${rTag} ${dTag} ${isMe?'<span style="font-size:9px;color:var(--tm)">(나)</span>':''}</div><div class="uid">${u.id} · ${u.created}</div></div><div class="uact">${pwReset}${role}${del}</div></div>`;
  }).join('');
}
function resetPw(uid){
  const users=getUsers(),u=users.find(x=>x.id===uid);if(!u)return;
  const np=prompt(u.name+'님의 새 비밀번호를 입력하세요:','1234');
  if(!np)return;if(np.length<4){toast('⚠️ 4자 이상 입력하세요');return;}
  u.pw=np;saveUsers(users);apiPost({action:'updateUsers',rows:users});
  toast('✅ '+u.name+'님 비밀번호 초기화 완료');
}

function renderAddUser(){
  const depts=getDepts();
  document.getElementById('aAddUser').innerHTML=`<div class="af"><h3>새 직원 추가</h3>
    <div class="fr"><label>이름</label><input type="text" class="field" id="aName" placeholder="홍길동"></div>
    <div class="fr"><label>아이디</label><input type="text" class="field" id="aId" placeholder="영문/숫자"></div>
    <div class="fr"><label>초기 비밀번호</label><input type="text" class="field" id="aPw" placeholder="1234"></div>
    <div class="fr"><label>부서</label><select class="field" id="aDept">${depts.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select></div>
    <div class="fr"><label>권한</label><select class="field" id="aRole"><option value="user">일반 직원</option><option value="admin">관리자</option></select></div>
    <div class="fb"><button class="btn-sm btn-p" style="flex:1" onclick="addUser()">추가하기</button></div>
    <div class="err" id="addErr"></div></div>`;
}

async function addUser(){
  const nm=document.getElementById('aName').value.trim(),id=document.getElementById('aId').value.trim(),pw=document.getElementById('aPw').value,dept=document.getElementById('aDept').value,role=document.getElementById('aRole').value,er=document.getElementById('addErr');
  if(!nm||!id||!pw){er.textContent='모든 항목을 입력하세요.';er.classList.add('show');return;}

// ISSUE MANAGER (with 3-level tree display)

let issueEditMode=false, issueEditTitle='';

function renderIssueManager(){
  const el=document.getElementById('aIssues');
  let html='<div class="af"><h3>📋 가이드 데이터 관리 (3단계 트리)</h3>';
  html+=`<div class="fb" style="margin-bottom:12px"><button class="btn-sm btn-p" style="flex:1" onclick="showIssueForm()">+ 새 가이드 추가</button><button class="btn-sm btn-o" style="flex:1;border:1px solid var(--bd)" onclick="syncAndRefresh()">🔄 서버 동기화</button></div>`;

  // 3-level tree: Major → Sub(Category) → Items
  Object.keys(MAJORS).forEach(mk=>{
    const m=MAJORS[mk];
    const subKeys=Object.keys(m.subs);
    let majorItemCount=0;subKeys.forEach(sk=>majorItemCount+=m.subs[sk].items.length);
    html+=`<div class="major-section">`;
    html+=`<div class="major-section-hdr">${m.icon} ${m.name} <span style="font-size:10px;color:var(--tm);font-weight:400">(${subKeys.length}개 소분류 · ${majorItemCount}건)</span></div>`;

    subKeys.forEach(sk=>{
      const sub=m.subs[sk];
      html+=`<div class="sub-section-hdr">${sub.icon} ${sub.name} <span style="font-size:10px;color:var(--tm)">(${sub.items.length}건)</span></div>`;
      sub.items.forEach(it=>{
        const sv=it.severity==='high'?'#EF4444':it.severity==='mid'?'#F59E0B':'#10B981';
        const t=it.title.replace(/'/g,"\\'");
        html+=`<div class="issue-card an"><div class="ic-color" style="background:${sv}"></div><div class="ic-info"><div class="ic-title">${it.title}</div><div class="ic-meta">${it.tags.join(', ')} · ${it.steps.length}단계</div></div><div class="uact"><button class="ub" onclick="editIssue('${t}')">✏️</button><button class="ub dl" onclick="askDelIssue('${t}')">✕</button></div></div>`;
      });
    });
    html+=`</div>`;
  });

  if(!Object.keys(MAJORS).length){
    html+='<div class="se">가이드 데이터가 없습니다. 서버 동기화 또는 새 가이드를 추가하세요.</div>';
  }

  html+='</div>';
  html+='<div id="issueFormWrap" style="display:none"></div>';
  el.innerHTML=html;
}

function onMajorChange(){

}
function onCatChange(){

}
function pickMajorIcon(el){

function pickMajorColor(el,c){

function pickIcon(el){

function pickColor(el,c){

function editIssue(title){
  const row=RAW_ISSUES.find(r=>String(r.title)===title);
  if(!row)return;
  // Find major_cat for this row
  let majorCat=String(row.major_cat||'');
  if(!majorCat){
    const cat=String(row.category||'');
    majorCat=DEF_MAJOR_MAP[cat]||'pc_trouble';
  }
  showIssueForm({
    major_cat:majorCat,
    category:String(row.category||''),title:String(row.title||''),severity:String(row.severity||'mid'),
    tags:String(row.tags||''),step1:String(row.step1||''),img1:String(row.img1||''),step2:String(row.step2||''),img2:String(row.img2||''),
    step3:String(row.step3||''),img3:String(row.img3||''),step4:String(row.step4||''),img4:String(row.img4||''),tip:String(row.tip||'')
  });
}

function askDelIssue(title){
  delTgt=title;delType='issue';document.getElementById('delTitle').textContent='가이드 삭제';
  document.getElementById('delMsg').innerHTML=`<b>${title}</b> 항목을 삭제하시겠습니까?`;document.getElementById('delModal').classList.add('show');
}

async function saveIssue(){
  const er=document.getElementById('issErr');

  // Major category
  let majorId=document.getElementById('issMajor').value;
  let majorName='',majorIcon='',majorColor='';
  if(majorId==='__new__'){
    majorName=document.getElementById('newMajorName').value.trim();
    majorIcon=document.getElementById('newMajorIcon').value||'📁';
    majorColor=document.getElementById('newMajorColor').value||'#4A6CF7';
    if(!majorName){er.textContent='카테고리 이름을 입력하세요.';er.classList.add('show');return;}
    majorId=majorName.replace(/[^가-힣a-zA-Z0-9]/g,'').toLowerCase()+'_'+Date.now()%10000;
  } else {
    if(MAJORS[majorId]){majorName=MAJORS[majorId].name;majorIcon=MAJORS[majorId].icon;majorColor=MAJORS[majorId].color;}
  }

  // Sub category
  let cat=document.getElementById('issCat').value;
  let catName='',catIcon='',catColor='';
  const title=document.getElementById('issTitle').value.trim();
  const sev=document.getElementById('issSev').value;
  const tags=document.getElementById('issTags').value.trim();
  const s1=document.getElementById('issS1').value.trim();
  if(!title||!s1){er.textContent='제목과 조치1은 필수입니다.';er.classList.add('show');return;}

  if(cat==='__new__'){
    catName=document.getElementById('newCatName').value.trim();
    catIcon=document.getElementById('newCatIcon').value||'📁';
    catColor=document.getElementById('newCatColor').value||'#4A6CF7';
    if(!catName){er.textContent='소분류 이름을 입력하세요.';er.classList.add('show');return;}
    cat=catName.replace(/[^가-힣a-zA-Z0-9]/g,'').toLowerCase()+'_'+Date.now()%10000;
  } else {
    if(DB[cat]){catName=DB[cat].name;catIcon=DB[cat].icon;catColor=DB[cat].color;}
  }
  er.classList.remove('show');

  const newRow={
    major_cat:majorId,major_name:majorName,major_icon:majorIcon,major_color:majorColor,
    category:cat,cat_name:catName,cat_icon:catIcon,cat_color:catColor,
    title,severity:sev,tags,
    step1:s1,img1:document.getElementById('issI1').value.trim(),
    step2:document.getElementById('issS2').value.trim(),img2:document.getElementById('issI2').value.trim(),
    step3:document.getElementById('issS3').value.trim(),img3:document.getElementById('issI3').value.trim(),
    step4:document.getElementById('issS4').value.trim(),img4:document.getElementById('issI4').value.trim(),
    tip:document.getElementById('issTip').value.trim()
  };

  if(issueEditMode){
    RAW_ISSUES=RAW_ISSUES.filter(r=>String(r.title)!==issueEditTitle);
  }
  RAW_ISSUES.push(newRow);
  s('raw_issues',RAW_ISSUES);buildDB(RAW_ISSUES);

  toast('📡 서버 저장 중...');
  await apiPost({action:'updateIssues',rows:RAW_ISSUES});
  toast(issueEditMode?'✅ 수정 완료':'✅ 가이드 추가 완료');
  document.getElementById('issueFormWrap').style.display='none';
  renderIssueManager();
}

async function syncAndRefresh(){
  toast('📡 동기화 중...');await syncFromServer();toast('✅ 동기화 완료');renderIssueManager();
}

// ═══ Depts ═══
function renderDepts(){
  const depts=getDepts(),el=document.getElementById('aDepts');
  let html=depts.map((d,i)=>`<div class="uc an" style="animation-delay:${i*.02}s"><div class="ua" style="background:${d.color}18;color:${d.color}">${d.name[0]}</div><div class="ui"><div class="un" style="font-size:13px">${d.name}</div><div class="uid">${getUsers().filter(u=>u.dept===d.id).length}명 소속</div></div><div class="uact">${depts.length>1?`<button class="ub dl" onclick="delDept('${d.id}')">✕</button>`:''}</div></div>`).join('');
  html+=`<div class="af" style="margin-top:10px"><h3>부서 추가</h3><div class="fr"><label>부서명</label><input type="text" class="field" id="deptName" placeholder="개발팀"></div><div class="fb"><button class="btn-sm btn-p" style="flex:1" onclick="addDept()">추가</button></div></div>`;
  el.innerHTML=html;
}
function addDept(){
  const nm=document.getElementById('deptName').value.trim();if(!nm){toast('⚠️ 부서명을 입력하세요');return;}
  const depts=getDepts(),id=nm.toLowerCase().replace(/\s/g,'_')+'_'+Date.now()%1000;
  const colors=['#F97316','#EC4899','#8B5CF6','#EF4444','#14B8A6','#6366F1'];
  depts.push({id,name:nm,color:colors[depts.length%colors.length]});saveDepts(depts);
  const perms=getPerms();perms[id]=[];savePerms(perms);
  apiPost({action:'updateDepts',rows:depts});
  toast('✅ '+nm+' 부서 추가');renderDepts();
}
function delDept(did){
  let depts=getDepts();if(depts.length<=1){toast('⚠️ 최소 1개 부서 필요');return;}
  if(getUsers().some(u=>u.dept===did)){toast('⚠️ 소속 직원이 있어 삭제 불가');return;}
  depts=depts.filter(d=>d.id!==did);saveDepts(depts);const perms=getPerms();delete perms[did];savePerms(perms);
  apiPost({action:'updateDepts',rows:depts});toast('🗑 부서 삭제');renderDepts();
}

// ═══ Perms (소분류/카테고리 기준) ═══
function renderPerms(){
  const depts=getDepts(),perms=getPerms(),el=document.getElementById('aPerms'),allCats=Object.keys(DB);
  let html='<div class="af"><h3>부서별 카테고리 접근 권한</h3><p style="font-size:11px;color:var(--ts);margin-bottom:12px;line-height:1.5">각 소분류(카테고리)에 접근할 수 있는 부서를 선택하세요.<br>관리자는 모든 카테고리를 볼 수 있습니다.</p><div class="perm-grid">';
  // 전체 row
  html+=`<div class="perm-row" style="border-bottom:2px solid var(--ac);padding-bottom:10px;margin-bottom:4px"><div class="perm-cat"><span class="picon">📌</span><b>전체</b></div><div class="perm-checks">`;
  depts.forEach(d=>{
    const dPerms=perms[d.id]||[];
    const allOn=allCats.every(k=>dPerms.includes(k));
    html+=`<span class="perm-chip ${allOn?'on':''}" onclick="tglPermAll('${d.id}')">${d.name}</span>`;
  });
  html+=`</div></div>`;

  // Group by major
  Object.keys(MAJORS).forEach(mk=>{
    const m=MAJORS[mk];
    html+=`<div style="font-size:11px;font-weight:600;color:var(--ac);padding:6px 0 2px;margin-top:4px">${m.icon} ${m.name}</div>`;
    Object.keys(m.subs).forEach(k=>{
      const c=m.subs[k];
      html+=`<div class="perm-row"><div class="perm-cat"><span class="picon">${c.icon}</span>${c.name}</div><div class="perm-checks">`;
      depts.forEach(d=>{const on=(perms[d.id]||[]).includes(k);html+=`<span class="perm-chip ${on?'on':''}" onclick="tglPerm('${d.id}','${k}')">${d.name}</span>`;});
      html+=`</div></div>`;
    });
  });

  html+='</div></div>';el.innerHTML=html;
}
function tglPerm(deptId,catKey){
  const perms=getPerms();if(!perms[deptId])perms[deptId]=[];const idx=perms[deptId].indexOf(catKey);
  if(idx>-1){perms[deptId].splice(idx,1);}else{perms[deptId].push(catKey);}
  savePerms(perms);const rows=Object.keys(perms).map(did=>({dept_id:did,categories:perms[did].join(',')}));apiPost({action:'updatePerms',rows});
  renderPerms();
}
function tglPermAll(deptId){
  const perms=getPerms(),allCats=Object.keys(DB);
  if(!perms[deptId])perms[deptId]=[];
  const allOn=allCats.every(k=>perms[deptId].includes(k));
  perms[deptId]=allOn?[]:allCats.slice();
  savePerms(perms);const rows=Object.keys(perms).map(did=>({dept_id:did,categories:perms[did].join(',')}));apiPost({action:'updatePerms',rows});
  renderPerms();
}

// PW
function showPwChange(){hideAll();document.getElementById('pwPanel').classList.add('active');document.getElementById('statsBar').style.display='none';document.getElementById('srchWrap').style.display='none';}
function changePw(){
  const cur=document.getElementById('curPw').value,nw=document.getElementById('newPw').value,nw2=document.getElementById('newPw2').value,er=document.getElementById('pwErr');
  if(!cur||!nw||!nw2){er.textContent='모든 항목을 입력하세요.';er.classList.add('show');return;}
  if(cur!==CU.pw){er.textContent='현재 비밀번호가 올바르지 않습니다.';er.classList.add('show');return;}
  if(nw!==nw2){er.textContent='새 비밀번호가 일치하지 않습니다.';er.classList.add('show');return;}
  if(nw.length<4){er.textContent='4자 이상 입력하세요.';er.classList.add('show');return;}
  er.classList.remove('show');const users=getUsers(),u=users.find(x=>x.id===CU.id);
  if(u){u.pw=nw;saveUsers(users);CU.pw=nw;apiPost({action:'updateUsers',rows:users});}
  document.getElementById('curPw').value='';document.getElementById('newPw').value='';document.getElementById('newPw2').value='';
  toast('✅ 비밀번호 변경 완료');goHome();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadCachedDB();checkSess();
