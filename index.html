<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1A2E">
<title>WIPS 헬프데스크</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#F5F5F7;--bgc:#FFF;--bgh:#1A1A2E;--tp:#1A1A2E;--ts:#5A5A72;--tm:#9090A0;
--bd:#E4E4EC;--ac:#4A6CF7;--al:#EEF1FE;--ag:rgba(74,108,247,.12);
--dg:#EF4444;--dl:#FEF2F2;--sc:#10B981;--sl:#ECFDF5;--wn:#F59E0B;
--sh:0 4px 12px rgba(0,0,0,.06);--r:12px;
}
@media(prefers-color-scheme:dark){:root{
--bg:#0D0D1A;--bgc:#1A1A2E;--bgh:#12122B;--tp:#E8E8F0;--ts:#A0A0B8;--tm:#6A6A80;
--bd:#2A2A40;--ac:#6B8AFF;--al:#1E2248;--ag:rgba(107,138,255,.15);
--dl:#2D1515;--sl:#0D2D20;--sh:0 4px 12px rgba(0,0,0,.3);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--tp);min-height:100vh}
.screen{display:none}.screen.active{display:block}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--bgc);border:1px solid var(--bd);border-radius:20px;padding:36px 28px;max-width:360px;width:100%;box-shadow:var(--sh);text-align:center}
.login-icon{width:64px;height:64px;background:var(--al);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:4px}
.login-card .sub{font-size:13px;color:var(--tm);margin-bottom:20px}
.field{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--tp);background:var(--bg);outline:none;margin-bottom:8px;transition:border-color .2s}
.field:focus{border-color:var(--ac)}.field::placeholder{color:var(--tm)}
.btn{width:100%;padding:12px;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn-p{background:var(--ac);color:#fff}
.btn-d{background:var(--dg);color:#fff}
.btn-o{background:transparent;border:1.5px solid var(--bd);color:var(--ts);font-weight:500}
.btn-sm{padding:9px 14px;font-size:12px;border-radius:var(--r);border:none;font-family:inherit;font-weight:600;cursor:pointer}
.err{color:var(--dg);font-size:12px;margin-top:6px;display:none;line-height:1.5}.err.show{display:block}
.login-ft{font-size:11px;color:var(--tm);margin-top:16px;line-height:1.6}
.hdr{background:var(--bgh);color:#fff;padding:14px 16px 22px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:-18px;left:-10%;width:120%;height:36px;background:var(--bg);border-radius:50% 50% 0 0}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-ic{width:32px;height:32px;background:rgba(255,255,255,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr-l h1{font-size:17px;font-weight:600}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5);margin-left:40px;margin-top:2px}
.hdr-r{display:flex;gap:5px;align-items:center}
.hdr-btn{background:rgba(255,255,255,.1);border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:14px}
.hdr-btn:hover{background:rgba(255,255,255,.2)}
.u-pill{font-size:10px;color:rgba(255,255,255,.55);background:rgba(255,255,255,.1);padding:2px 8px;border-radius:14px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dept-pill{font-size:9px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.06);padding:2px 6px;border-radius:10px}
.srch-w{padding:0 16px;margin-top:-8px;position:relative;z-index:10}
.srch{background:var(--bgc);border-radius:var(--r);box-shadow:var(--sh);display:flex;align-items:center;padding:0 14px;border:1.5px solid transparent}
.srch:focus-within{border-color:var(--ac)}
.srch svg{flex-shrink:0;color:var(--tm);width:16px;height:16px}
.srch input{flex:1;border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;color:var(--tp);padding:12px 10px}
.srch input::placeholder{color:var(--tm)}
.sc{display:none;background:var(--bd);border:none;width:20px;height:20px;border-radius:50%;font-size:11px;color:var(--ts);cursor:pointer;align-items:center;justify-content:center}.sc.show{display:flex}
.stats{display:flex;gap:6px;padding:12px 16px 4px;overflow-x:auto;flex-wrap:nowrap}.stats::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--bgc);border:1px solid var(--bd);border-radius:14px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--ts);white-space:nowrap}
.chip b{color:var(--ac);font-weight:600}
.content{padding:6px 16px 100px}
.sec-t{font-size:14px;font-weight:600;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
.sec-t .cnt{font-size:11px;font-weight:500;color:var(--tm);background:var(--al);padding:2px 7px;border-radius:8px}
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.cc{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:14px 12px;cursor:pointer;transition:transform .12s;position:relative}
.cc:active{transform:scale(.97)}
.cc .ci{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px}
.cc .cn{font-size:13px;font-weight:600;margin-bottom:2px}
.cc .ct{font-size:11px;color:var(--tm)}
.cc .cd{position:absolute;top:10px;right:10px;width:5px;height:5px;border-radius:50%}
.cc.locked{opacity:.35;pointer-events:none}
.cc.locked::after{content:'🔒';position:absolute;top:10px;right:10px;font-size:12px}
.det{display:none}.det.active{display:block}
.det-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bk{background:var(--bgc);border:1px solid var(--bd);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ts);flex-shrink:0;font-size:15px}
.bk:active{background:var(--bd)}
.dt h2{font-size:16px;font-weight:600}.dt span{font-size:11px;color:var(--tm)}
.ic{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.ic.open{box-shadow:var(--sh)}
.ih{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ih:active{background:var(--al)}
.sv{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sh{background:#EF4444}.sm{background:#F59E0B}.sl{background:#10B981}
.ih .nm{flex:1;font-size:13px;font-weight:500;line-height:1.4}
.ar{flex-shrink:0;font-size:12px;color:var(--tm);transition:transform .2s}
.ic.open .ar{transform:rotate(180deg)}
.ib{display:none;padding:0 14px 12px;border-top:1px solid var(--bd)}
.ic.open .ib{display:block;padding-top:10px}
.tg{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tgi{font-size:10px;font-weight:500;padding:2px 7px;border-radius:14px}
.thw{background:#FEF3C7;color:#92400E}.tsw{background:#EDE9FE;color:#5B21B6}.tnt{background:#DBEAFE;color:#1E40AF}
@media(prefers-color-scheme:dark){.thw{background:#422006;color:#FCD34D}.tsw{background:#2E1065;color:#C4B5FD}.tnt{background:#172554;color:#93C5FD}}
.sli{list-style:none}
.si{display:flex;gap:10px;padding:5px 0;position:relative}
.si:not(:last-child)::after{content:'';position:absolute;left:11px;top:26px;width:1.5px;height:calc(100% - 12px);background:var(--bd)}
.sn{width:22px;height:22px;background:var(--al);color:var(--ac);font-size:10px;font-weight:600;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1}
.st{font-size:12px;line-height:1.6;color:var(--ts);padding-top:2px;flex:1}.st b{color:var(--tp);font-weight:500}
.step-img{width:100%;max-width:320px;border-radius:8px;margin-top:6px;border:1px solid var(--bd);cursor:pointer}
.tip{background:var(--al);border-radius:8px;padding:7px 10px;margin-top:6px;font-size:11px;line-height:1.5;color:var(--ac);display:flex;gap:6px}
.sr{display:none}.sr.active{display:block}
.se{text-align:center;padding:50px 20px;color:var(--tm);font-size:13px}
.ap{display:none}.ap.active{display:block}
.atabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.atabs::-webkit-scrollbar{display:none}
.atab{flex-shrink:0;padding:8px 14px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bgc);font-family:inherit;font-size:12px;font-weight:500;color:var(--ts);cursor:pointer;white-space:nowrap}
.atab.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.uc{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ua{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.ui{flex:1;min-width:0}
.un{font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ur{font-size:9px;padding:1px 5px;border-radius:6px;font-weight:500}
.ura{background:var(--al);color:var(--ac)}.uru{background:var(--bg);color:var(--tm)}
.ud-tag{font-size:9px;padding:1px 5px;border-radius:6px;font-weight:500;background:var(--sl);color:var(--sc)}
.uid{font-size:10px;color:var(--tm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uact{display:flex;gap:3px}
.ub{background:var(--bg);border:1px solid var(--bd);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ts);font-size:12px}
.ub:hover{background:var(--bd)}.ub.dl{color:var(--dg)}.ub.dl:hover{background:var(--dl)}
.af{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px}
.af h3{font-size:13px;font-weight:600;margin-bottom:10px}
.fr{margin-bottom:6px}.fr label{font-size:11px;color:var(--ts);display:block;margin-bottom:3px}
.fr select{width:100%;padding:10px;border:1.5px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--tp);background:var(--bg);outline:none}
.fb{display:flex;gap:6px;margin-top:10px}
.perm-grid{margin-top:8px}
.perm-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.perm-row:last-child{border-bottom:none}
.perm-cat{flex:1;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.perm-cat .picon{font-size:16px}
.perm-checks{display:flex;gap:4px;flex-wrap:wrap}
.perm-chip{font-size:10px;padding:3px 8px;border-radius:8px;cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--ts);transition:all .15s;user-select:none}
.perm-chip.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.perm-chip:hover{border-color:var(--ac)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bgh);color:#fff;padding:9px 18px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.2);opacity:0;transition:all .3s;z-index:500;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mo.show{display:flex}
.ml{background:var(--bgc);border-radius:16px;padding:22px;max-width:320px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
.ml h3{font-size:15px;font-weight:600;margin-bottom:6px}
.ml p{font-size:12px;color:var(--ts);margin-bottom:16px;line-height:1.6}
.ml .mbs{display:flex;gap:6px}.ml .mbs .btn{flex:1}
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;cursor:pointer}
.img-modal.show{display:flex}
.img-modal img{max-width:100%;max-height:90vh;border-radius:8px}
.sync-bar{background:var(--al);padding:6px 12px;border-radius:8px;font-size:11px;color:var(--ac);text-align:center;margin-bottom:8px;display:none}
.sync-bar.show{display:block}
/* Issue management */
.issue-card{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.issue-card .ic-color{width:4px;height:32px;border-radius:2px;flex-shrink:0}
.issue-card .ic-info{flex:1;min-width:0}
.issue-card .ic-title{font-size:12px;font-weight:500}
.issue-card .ic-meta{font-size:10px;color:var(--tm)}
.cat-select-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.cat-sel-chip{font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--ts);transition:all .15s}
.cat-sel-chip.active{color:#fff;border-color:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.an{animation:fadeUp .2s ease-out both}
@media(min-width:480px){.cg{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){body{display:flex;justify-content:center}.app{max-width:480px;width:100%}}
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
<div class="login-wrap"><div class="login-card">
  <div class="login-icon">🏢</div>
  <h1>WIPS 헬프데스크</h1>
  <p class="sub">사내 업무 가이드 & IT 지원 시스템</p>
  <input type="text" class="field" id="loginId" placeholder="아이디" onkeydown="if(event.key==='Enter')doLogin()">
  <input type="password" class="field" id="loginPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn btn-p" id="loginBtn" onclick="doLogin()">로그인</button>
  <div class="err" id="loginErr"></div>
  <div class="login-ft">데이터는 Google Sheets에서 관리됩니다</div>
</div></div>
</div>

<!-- MAIN -->
<div class="screen" id="mainScreen">
<header class="hdr">
  <div class="hdr-row">
    <div class="hdr-l"><div class="hdr-ic">🏢</div><h1>WIPS 헬프데스크</h1></div>
    <div class="hdr-r">
      <span class="u-pill" id="userPill"></span>
      <span class="dept-pill" id="deptPill"></span>
      <button class="hdr-btn" id="adminBtn" onclick="showAdmin()" style="display:none">⚙️</button>
      <button class="hdr-btn" onclick="showPwChange()">🔑</button>
      <button class="hdr-btn" onclick="doLogout()">🚪</button>
    </div>
  </div>
  <div class="hdr-sub" id="hdrSub">카테고리를 선택하거나 키워드를 검색하세요</div>
</header>

<div class="srch-w" id="srchWrap">
  <div class="srch">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="sInput" placeholder="검색 (장애 증상, 업무 방법 등)" oninput="doSearch(this.value)">
    <button class="sc" id="sClear" onclick="clrSearch()">✕</button>
  </div>
</div>

<div class="stats" id="statsBar">
  <div class="chip">전체 <b id="totalCnt">0</b>건</div>
  <div class="chip">열람가능 <b id="accessCnt">0</b>건</div>
</div>

<div class="content">
  <div class="sync-bar" id="syncBar">📡 서버에서 데이터 동기화 중...</div>
  <div id="homeView">
    <div class="sec-t">카테고리</div>
    <div class="cg" id="catGrid"></div>
  </div>
  <div class="det" id="detView">
    <div class="det-h"><button class="bk" onclick="detBack()">◀</button><div class="dt"><h2 id="dT"></h2><span id="dC"></span></div></div>
    <div id="dCards"></div>
  </div>
  <div class="sr" id="sView">
    <div class="sec-t">검색 결과 <span class="cnt" id="sCnt">0건</span></div>
    <div id="sCards"></div>
  </div>

  <!-- ADMIN -->
  <div class="ap" id="adminPanel">
    <div class="det-h"><button class="bk" onclick="hideAdmin()">◀</button><div class="dt"><h2>⚙️ 관리자 설정</h2><span>사용자·가이드 데이터·부서·권한 관리</span></div></div>
    <div class="atabs" id="aTabs">
      <button class="atab active" onclick="aTab('users',this)">직원 관리</button>
      <button class="atab" onclick="aTab('adduser',this)">직원 추가</button>
      <button class="atab" onclick="aTab('issues',this)">가이드 관리</button>
      <button class="atab" onclick="aTab('depts',this)">부서 관리</button>
      <button class="atab" onclick="aTab('perms',this)">카테고리 권한</button>
    </div>
    <div id="aUsers"></div>
    <div id="aAddUser" style="display:none"></div>
    <div id="aIssues" style="display:none"></div>
    <div id="aDepts" style="display:none"></div>
    <div id="aPerms" style="display:none"></div>
  </div>

  <!-- PW Change -->
  <div class="ap" id="pwPanel">
    <div class="det-h"><button class="bk" onclick="goHome()">◀</button><div class="dt"><h2>🔑 비밀번호 변경</h2></div></div>
    <div class="af">
      <div class="fr"><label>현재 비밀번호</label><input type="password" class="field" id="curPw"></div>
      <div class="fr"><label>새 비밀번호</label><input type="password" class="field" id="newPw"></div>
      <div class="fr"><label>새 비밀번호 확인</label><input type="password" class="field" id="newPw2"></div>
      <button class="btn btn-p" onclick="changePw()" style="margin-top:6px">변경하기</button>
      <div class="err" id="pwErr"></div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>
<div class="mo" id="delModal"><div class="ml"><h3 id="delTitle">삭제</h3><p id="delMsg"></p><div class="mbs"><button class="btn btn-o" onclick="closeModal()">취소</button><button class="btn btn-d" onclick="confirmDel()">삭제</button></div></div></div>
<div class="img-modal" id="imgModal" onclick="this.classList.remove('show')"><img id="imgModalSrc"></div>

</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxTDMRVJQ3aBbVe-CLexKVYonRejefykO-KwH_zjr3zFmrJj3ISItqPfiYtIbPkSlKU/exec';

const DEF_DEPTS=[{id:'it',name:'전산팀',color:'#4A6CF7'},{id:'security',name:'보안팀',color:'#06B6D4'},{id:'infra',name:'인프라팀',color:'#10B981'},{id:'general',name:'일반',color:'#9090A0'}];
const DEF_PERMS={it:['printer','network','bluescreen','boot','software','monitor','keyboard','security','storage','sound'],security:['security','network','software'],infra:['network','boot','storage','monitor'],general:['printer','software','keyboard','sound']};
const DEF_USERS=[{id:'admin',name:'관리자',pw:'admin1234',role:'admin',dept:'it',created:'2026-05-08'}];

function g(k,d){try{const v=JSON.parse(localStorage.getItem('pcg_'+k));return v||d;}catch(e){return d;}}
function s(k,v){localStorage.setItem('pcg_'+k,JSON.stringify(v));}
function getUsers(){return g('users',DEF_USERS);}
function saveUsers(u){s('users',u);}
function getDepts(){return g('depts',DEF_DEPTS);}
function saveDepts(d){s('depts',d);}
function getPerms(){return g('perms',DEF_PERMS);}

function driveImgUrl(url){if(!url)return '';const m=String(url).match(/\/d\/([a-zA-Z0-9_-]+)/);if(m)return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800';return String(url);}

// 사용자 입력을 화면에 그릴 때 특수문자(< > & " ')를 안전하게 변환.
// 일반 텍스트와 큰따옴표 속성값 양쪽에 모두 안전하다.
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// 서버 응답 성공 판별 (null=네트워크/파싱 실패, error 필드=서버 오류)
function apiOk(res){return !!(res&&!res.error);}

// 가이드 고유 ID 생성 (제목 대신 이 값으로 수정/삭제를 식별)
function genId(){return 'iss_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// 서버에는 id 칼럼이 없을 수 있으므로, 동기화 시 내용이 같은 행은 기존 id를 이어받게 해
// 새로고침/동기화 후에도 id가 안정적으로 유지되도록 한다. 진짜 중복 행은 새 id로 분리.
function assignIds(rows,prevRows){
  const sig=r=>[r.category,r.title,r.step1,r.step2,r.step3,r.step4].join('|');
  const map={};(prevRows||[]).forEach(r=>{if(r&&r.id&&!(sig(r) in map))map[sig(r)]=r.id;});
  const seen=new Set();
  rows.forEach(r=>{let id=r.id||map[sig(r)];if(!id||seen.has(id))id=genId();r.id=id;seen.add(id);});
  return rows;
}

async function syncFromServer(){
  const bar=document.getElementById('syncBar');if(bar)bar.classList.add('show');
  const data=await apiGet('getAll');
  if(!data||data.error){if(bar)bar.classList.remove('show');return false;}
  if(data.users&&data.users.length){saveUsers(data.users.map(u=>({id:String(u.id||''),name:String(u.name||''),pw:String(u.pw||''),role:String(u.role||'user'),dept:String(u.dept||'general'),created:String(u.created||'').slice(0,10)})));}
  if(data.depts&&data.depts.length){saveDepts(data.depts.map(d=>({id:String(d.id||''),name:String(d.name||''),color:String(d.color||'#9090A0')})));}
  if(data.perms&&data.perms.length){const perms={};data.perms.forEach(p=>{perms[String(p.dept_id||'')]=String(p.categories||'').split(',').map(x=>x.trim()).filter(Boolean);});savePerms(perms);}
  if(data.issues&&data.issues.length){
    const prev=RAW_ISSUES;
    assignIds(data.issues,prev);
    RAW_ISSUES=data.issues;s('raw_issues',RAW_ISSUES);
    buildDB(data.issues);
  }
  if(bar)bar.classList.remove('show');return true;
}

function buildDB(issues){
  DB={};
  issues.forEach(row=>{
    if(!row.id)row.id=genId();
    const cat=String(row.category||'');if(!cat)return;
    if(!DB[cat])DB[cat]={name:String(row.cat_name||cat),icon:String(row.cat_icon||'📁'),color:String(row.cat_color||'#9090A0'),items:[]};
    const steps=[],imgs=[];
    for(let i=1;i<=4;i++){const st=String(row['step'+i]||'');if(st){steps.push(st);imgs.push(driveImgUrl(row['img'+i]||''));}}
    const tags=String(row.tags||'').split(',').map(x=>x.trim()).filter(Boolean);
    DB[cat].items.push({id:String(row.id),subcat:String(row.subcat||''),subcat2:String(row.subcat2||''),subcat_icon:String(row.subcat_icon||''),title:String(row.title||''),severity:String(row.severity||'mid'),tags,steps,imgs,tip:String(row.tip||'')});
  });
  s('db_cache',DB);
}

function loadCachedDB(){RAW_ISSUES=g('raw_issues',[]);assignIds(RAW_ISSUES,RAW_ISSUES);if(RAW_ISSUES.length){buildDB(RAW_ISSUES);}else{const c=g('db_cache',null);if(c)DB=c;}}

// 한 카테고리 안의 소분류 목록(이름+건수)을 입력 순서대로 반환. 소분류 없는 항목은 이름 ''.
// 소분류 목록(이름+건수). subcat 기준. '' = 분류 없음.
function getSubs(cat){
  const order=[],map={},icon={};
  (DB[cat]?DB[cat].items:[]).forEach(it=>{const s=it.subcat||'';if(!(s in map)){map[s]=0;icon[s]='';order.push(s);}map[s]++;if(!icon[s]&&it.subcat_icon)icon[s]=it.subcat_icon;});
  return order.map(s=>({name:s,count:map[s],icon:icon[s]}));
}
// 소소분류 목록. (cat, 해당 subcat) 안에서 subcat2 기준. '' = 분류 없음.
function getSub2s(cat,sub){
  const order=[],map={};
  (DB[cat]?DB[cat].items:[]).forEach(it=>{if((it.subcat||'')!==sub)return;const s=it.subcat2||'';if(!(s in map)){map[s]=0;order.push(s);}map[s]++;});
  return order.map(s=>({name:s,count:map[s]}));
}
// 분류 타일 목록을 그리는 공통 함수 (타일마다 아이콘 지정 가능, 없으면 카테고리 아이콘)
function renderTiles(c,title,sub,arr,handler){
  hideAll();document.getElementById('statsBar').style.display='none';document.getElementById('srchWrap').style.display='block';
  document.getElementById('detView').classList.add('active');
  document.getElementById('dT').textContent=title;
  document.getElementById('dC').textContent=arr.length+'개 분류';
  let html='<div class="cg">';
  arr.forEach((s,i)=>{const ic=s.icon||c.icon;html+=`<div class="cc an" style="animation-delay:${i*.03}s" onclick="${handler}(${i})"><div class="cd" style="background:${c.color}"></div><div class="ci" style="background:${c.color}15">${esc(ic)}</div><div class="cn">${esc(s.name||'기타')}</div><div class="ct">${s.count}건</div></div>`;});
  html+='</div>';
  document.getElementById('dCards').innerHTML=html;
  scrollTo(0,0);
}

// 1단계: 카테고리 선택 → 소분류 목록 (없으면 항목 바로)
function showCat(k){
  const c=DB[k];if(!c)return;curCat=k;curSub=null;curSub2=null;
  const subs=getSubs(k);
  if(!subs.some(s=>s.name!=='')){showItems(k,null,null);return;}
  curView='sublist';
  renderTiles(c,c.icon+' '+c.name,null,subs,'openSub');
}
// 2단계: 소분류 선택 → 소소분류 목록 (없으면 항목 바로)
function openSub(i){
  const subs=getSubs(curCat);if(!subs[i])return;const s=subs[i].name;
  const sub2s=getSub2s(curCat,s);
  if(sub2s.some(x=>x.name!=='')){renderSub2(curCat,s);}
  else{showItems(curCat,s,null);}
}
function renderSub2(cat,sub){
  const c=DB[cat];if(!c)return;curCat=cat;curSub=sub;curSub2=null;curView='sub2list';
  renderTiles(c,c.icon+' '+c.name+' › '+(sub||'기타'),sub,getSub2s(cat,sub),'openSub2');
}
// 3단계: 소소분류 선택 → 항목
function openSub2(i){const sub2s=getSub2s(curCat,curSub);if(sub2s[i])showItems(curCat,curSub,sub2s[i].name);}

// 항목 화면 (잎). sub=null이면 카테고리 전체, sub2=null이면 소분류까지만 필터
function showItems(cat,sub,sub2){
  const c=DB[cat];if(!c)return;curCat=cat;curSub=sub;curSub2=sub2;curView='items';
  let items;
  if(sub===null)items=c.items;
  else if(sub2===null)items=c.items.filter(it=>(it.subcat||'')===sub);
  else items=c.items.filter(it=>(it.subcat||'')===sub&&(it.subcat2||'')===sub2);
  hideAll();document.getElementById('statsBar').style.display='none';document.getElementById('srchWrap').style.display='block';
  document.getElementById('detView').classList.add('active');
  let t=c.icon+' '+c.name;if(sub!==null)t+=' › '+(sub||'기타');if(sub2!==null)t+=' › '+(sub2||'기타');
  document.getElementById('dT').textContent=t;
  document.getElementById('dC').textContent=items.length+'건';
  renderCards(items,document.getElementById('dCards'),cat);
  scrollTo(0,0);
}

async function confirmDel(){

    let users=getUsers();const u=users.find(x=>x.id===delTgt);users=users.filter(x=>x.id!==delTgt);saveUsers(users);closeModal();

    toast(apiOk(res)?'🚫 '+(u?u.name:'직원')+'님 삭제':'⚠️ 삭제 — 서버 반영 실패, 다시 시도하세요');
    renderUserList();
  } else if(delType==='issue'&&delTgt){
    RAW_ISSUES=RAW_ISSUES.filter(r=>String(r.id)!==String(delTgt));s('raw_issues',RAW_ISSUES);buildDB(RAW_ISSUES);closeModal();

    renderIssueManager();
  }
}

function editIssue(id){
  const row=RAW_ISSUES.find(r=>String(r.id)===String(id));
  if(!row)return;
  showIssueForm({
    id:String(row.id||''),
    category:String(row.category||''),subcat:String(row.subcat||''),subcat2:String(row.subcat2||''),subcat_icon:String(row.subcat_icon||''),title:String(row.title||''),severity:String(row.severity||'mid'),
    tags:String(row.tags||''),step1:String(row.step1||''),img1:String(row.img1||''),step2:String(row.step2||''),img2:String(row.img2||''),
    step3:String(row.step3||''),img3:String(row.img3||''),step4:String(row.step4||''),img4:String(row.img4||''),tip:String(row.tip||'')
  });
}

function askDelIssue(id){
  const row=RAW_ISSUES.find(r=>String(r.id)===String(id));
  delTgt=id;delType='issue';document.getElementById('delTitle').textContent='가이드 삭제';
  const title=row?row.title:'';
  document.getElementById('delMsg').innerHTML=`<b>${esc(title)}</b> 항목을 삭제하시겠습니까?`;document.getElementById('delModal').classList.add('show');
}

async function saveIssue(){
  const er=document.getElementById('issErr');
  let cat=document.getElementById('issCat').value;
  const title=document.getElementById('issTitle').value.trim();
  const s1=document.getElementById('issS1').value.trim();
  if(!title||!s1){er.textContent='제목과 조치1은 필수입니다.';er.classList.add('show');return;}

  let catName='',catIcon='',catColor='';
  if(cat==='__new__'){
    catName=document.getElementById('newCatName').value.trim();
    catIcon=document.getElementById('newCatIcon').value||'📁';
    catColor=document.getElementById('newCatColor').value||'#4A6CF7';
    if(!catName){er.textContent='카테고리 이름을 입력하세요.';er.classList.add('show');return;}
    cat=catName.replace(/[^가-힣a-zA-Z0-9]/g,'').toLowerCase()+'_'+Date.now()%10000;
  } else {
    if(DB[cat]){catName=DB[cat].name;catIcon=DB[cat].icon;catColor=DB[cat].color;}
  }
  er.classList.remove('show');

  const newRow={
    id:issueEditMode&&issueEditId?issueEditId:genId(),
    category:cat,cat_name:catName,cat_icon:catIcon,cat_color:catColor,
    subcat:document.getElementById('issSub').value.trim(),
    subcat2:document.getElementById('issSub2').value.trim(),
    subcat_icon:document.getElementById('issSubIcon').value.trim(),
    title,
    step1:s1,img1:document.getElementById('issI1').value.trim(),
    step2:document.getElementById('issS2').value.trim(),img2:document.getElementById('issI2').value.trim(),
    step3:document.getElementById('issS3').value.trim(),img3:document.getElementById('issI3').value.trim(),
    step4:document.getElementById('issS4').value.trim(),img4:document.getElementById('issI4').value.trim(),
    tip:document.getElementById('issTip').value.trim()
  };

  // 저장 직전 서버 최신본을 먼저 받아, 다른 관리자가 추가한 가이드를 덮어쓰지 않도록 한다.
  toast('📡 최신 데이터 확인 중...');
  await syncFromServer();

  if(issueEditMode){
    RAW_ISSUES=RAW_ISSUES.filter(r=>String(r.id)!==String(issueEditId));
  }
  RAW_ISSUES.push(newRow);
  // 소분류 아이콘을 지정했으면 같은 카테고리·소분류의 모든 가이드에 동일하게 적용
  if(newRow.subcat&&newRow.subcat_icon){
    RAW_ISSUES.forEach(r=>{if(String(r.category)===String(newRow.category)&&String(r.subcat||'')===String(newRow.subcat))r.subcat_icon=newRow.subcat_icon;});
  }
  s('raw_issues',RAW_ISSUES);buildDB(RAW_ISSUES);

  // Sync all issues to server
  toast('📡 서버 저장 중...');
  const res=await apiPost({action:'updateIssues',rows:RAW_ISSUES});
  if(!apiOk(res)){
    toast('⚠️ 서버 저장 실패 — 인터넷 확인 후 다시 시도하세요');
    renderIssueManager();
    return;
  }
  toast(issueEditMode?'✅ 수정 완료':'✅ 가이드 추가 완료');
  document.getElementById('issueFormWrap').style.display='none';
  renderIssueManager();
}

async function syncAndRefresh(){
  toast('📡 동기화 중...');await syncFromServer();toast('✅ 동기화 완료');renderIssueManager();
}

// Depts
function renderDepts(){
  const depts=getDepts(),el=document.getElementById('aDepts');
  let html=depts.map((d,i)=>`<div class="uc an" style="animation-delay:${i*.02}s"><div class="ua" style="background:${d.color}18;color:${d.color}">${esc(d.name[0])}</div><div class="ui"><div class="un" style="font-size:13px">${esc(d.name)}</div><div class="uid">${getUsers().filter(u=>u.dept===d.id).length}명 소속</div></div><div class="uact">${depts.length>1?`<button class="ub dl" onclick="delDept('${d.id}')">✕</button>`:''}</div></div>`).join('');
  html+=`<div class="af" style="margin-top:10px"><h3>부서 추가</h3><div class="fr"><label>부서명</label><input type="text" class="field" id="deptName" placeholder="개발팀"></div><div class="fb"><button class="btn-sm btn-p" style="flex:1" onclick="addDept()">추가</button></div></div>`;
  el.innerHTML=html;
}
function addDept(){
  const nm=document.getElementById('deptName').value.trim();if(!nm){toast('⚠️ 부서명을 입력하세요');return;}
  const depts=getDepts(),id=(nm.toLowerCase().replace(/[^\w가-힣]/g,'')||'dept')+'_'+Date.now()%1000;
  const colors=['#F97316','#EC4899','#8B5CF6','#EF4444','#14B8A6','#6366F1'];
  depts.push({id,name:nm,color:colors[depts.length%colors.length]});saveDepts(depts);
  const perms=getPerms();perms[id]=[];savePerms(perms);
  renderDepts();
  apiPost({action:'updateDepts',rows:depts}).then(res=>toast(apiOk(res)?'✅ '+nm+' 부서 추가':'⚠️ 부서 추가 — 서버 반영 실패, 다시 시도하세요'));
}
function delDept(did){
  let depts=getDepts();if(depts.length<=1){toast('⚠️ 최소 1개 부서 필요');return;}
  if(getUsers().some(u=>u.dept===did)){toast('⚠️ 소속 직원이 있어 삭제 불가');return;}
  depts=depts.filter(d=>d.id!==did);saveDepts(depts);const perms=getPerms();delete perms[did];savePerms(perms);
  renderDepts();
  apiPost({action:'updateDepts',rows:depts}).then(res=>toast(apiOk(res)?'🗑 부서 삭제':'⚠️ 부서 삭제 — 서버 반영 실패, 다시 시도하세요'));
}

// Perms
function renderPerms(){
  const depts=getDepts(),perms=getPerms(),el=document.getElementById('aPerms'),allCats=Object.keys(DB);
  let html='<div class="af"><h3>부서별 카테고리 접근 권한</h3><p style="font-size:11px;color:var(--ts);margin-bottom:12px;line-height:1.5">각 카테고리에 접근할 수 있는 부서를 선택하세요.<br>관리자는 모든 카테고리를 볼 수 있습니다.</p><div class="perm-grid">';
  // 전체 row
  html+=`<div class="perm-row" style="border-bottom:2px solid var(--ac);padding-bottom:10px;margin-bottom:4px"><div class="perm-cat"><span class="picon">📌</span><b>전체</b></div><div class="perm-checks">`;
  depts.forEach(d=>{
    const dPerms=perms[d.id]||[];
    const allOn=allCats.every(k=>dPerms.includes(k));
    html+=`<span class="perm-chip ${allOn?'on':''}" onclick="tglPermAll('${d.id}')">${esc(d.name)}</span>`;
  });
  html+=`</div></div>`;
  // Individual categories
  allCats.forEach(k=>{const c=DB[k];html+=`<div class="perm-row"><div class="perm-cat"><span class="picon">${esc(c.icon)}</span>${esc(c.name)}</div><div class="perm-checks">`;depts.forEach(d=>{const on=(perms[d.id]||[]).includes(k);html+=`<span class="perm-chip ${on?'on':''}" onclick="tglPerm('${d.id}','${k}')">${esc(d.name)}</span>`;});html+=`</div></div>`;});
  html+='</div></div>';el.innerHTML=html;
}
function tglPerm(deptId,catKey){
  const perms=getPerms();if(!perms[deptId])perms[deptId]=[];const idx=perms[deptId].indexOf(catKey);
  if(idx>-1){perms[deptId].splice(idx,1);}else{perms[deptId].push(catKey);}
  savePerms(perms);renderPerms();
  const rows=Object.keys(perms).map(did=>({dept_id:did,categories:perms[did].join(',')}));
  apiPost({action:'updatePerms',rows}).then(res=>{if(!apiOk(res))toast('⚠️ 권한 변경 — 서버 반영 실패, 다시 시도하세요');});
}
function tglPermAll(deptId){
  const perms=getPerms(),allCats=Object.keys(DB);
  if(!perms[deptId])perms[deptId]=[];
  const allOn=allCats.every(k=>perms[deptId].includes(k));
  perms[deptId]=allOn?[]:allCats.slice();
  savePerms(perms);renderPerms();
  const rows=Object.keys(perms).map(did=>({dept_id:did,categories:perms[did].join(',')}));
  apiPost({action:'updatePerms',rows}).then(res=>{if(!apiOk(res))toast('⚠️ 권한 변경 — 서버 반영 실패, 다시 시도하세요');});
}

function changePw(){
  const cur=document.getElementById('curPw').value,nw=document.getElementById('newPw').value,nw2=document.getElementById('newPw2').value,er=document.getElementById('pwErr');
  if(!cur||!nw||!nw2){er.textContent='모든 항목을 입력하세요.';er.classList.add('show');return;}
  if(cur!==CU.pw){er.textContent='현재 비밀번호가 올바르지 않습니다.';er.classList.add('show');return;}
  if(nw!==nw2){er.textContent='새 비밀번호가 일치하지 않습니다.';er.classList.add('show');return;}
  if(nw.length<4){er.textContent='4자 이상 입력하세요.';er.classList.add('show');return;}
  er.classList.remove('show');const users=getUsers(),u=users.find(x=>x.id===CU.id);
  if(u){u.pw=nw;saveUsers(users);CU.pw=nw;}
  document.getElementById('curPw').value='';document.getElementById('newPw').value='';document.getElementById('newPw2').value='';
  goHome();
  apiPost({action:'updateUsers',rows:users}).then(res=>toast(apiOk(res)?'✅ 비밀번호 변경 완료':'⚠️ 변경 — 서버 반영 실패, 다시 시도하세요'));
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadCachedDB();checkSess();
</script>
